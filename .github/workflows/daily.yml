name: Daily bike sweep

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      debug_craigslist:
        description: "Dump raw craigslist HTML instead of running the sweep"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Debug craigslist page structure
        if: github.event.inputs.debug_craigslist == 'true'
        run: |
          python3 - <<'EOF'
          import httpx
          urls = [
              "https://sfbay.craigslist.org/search/bia?query=Trek+720",
          ]
          with httpx.Client(follow_redirects=True) as c:
              for url in urls:
                  r = c.get(url, headers={"User-Agent": "Mozilla/5.0 (vintage-bike-agent)"}, timeout=15)
                  print(f"=== {url} -> final {r.url} status {r.status_code} ===")
                  print(r.text[:6000])
                  print("=== END SNIPPET ===")
          EOF

      - name: Run sweep
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BIKE_AGENT_CONFIG: config.ci.yaml
        run: python -m agent.main

      - name: Commit updated dedup state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen.json
          git diff --cached --quiet || git commit -m "Update seen.json [skip ci]"
          git push
